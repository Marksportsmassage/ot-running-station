<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>物理因子治療學｜跑台考試</title>
  <style>
    :root{--bg:#f7f7f4;--card:#fff;--text:#1f2937;--muted:#64748b;--line:#e5e7eb;--accent:#665a9a;--accent2:#efedfb;--warn:#fff7ed;--warnLine:#fed7aa}
    *{box-sizing:border-box}html{scroll-behavior:smooth}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei","PingFang TC","Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.72}
    header{padding:32px 18px 20px;background:linear-gradient(135deg,#efedfb,#fff);border-bottom:1px solid var(--line)}.wrap{max-width:1080px;margin:0 auto}
    h1{margin:0 0 8px;font-size:clamp(1.7rem,3.2vw,2.6rem);line-height:1.2}.subtitle,.small{color:var(--muted)}
    .toolbar{position:sticky;top:0;z-index:10;background:rgba(247,247,244,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:12px 18px}
    .toolbar .wrap{display:flex;gap:10px;align-items:center;flex-wrap:wrap}input[type=search]{flex:1 1 260px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;font-size:16px;background:white}
    button,.btn{border:0;border-radius:12px;padding:10px 14px;background:var(--accent);color:white;cursor:pointer;text-decoration:none;font-weight:700}.btn.secondary{background:#475569}
    main{padding:22px 18px 56px}.note{background:#eef2ff;border:1px solid #c7d2fe;border-radius:18px;padding:18px;margin:12px 0 22px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin:18px 0 30px}.toc{display:block;width:100%;min-height:76px;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;box-shadow:0 1px 2px rgba(0,0,0,.03);color:var(--text);cursor:pointer;font:inherit}.toc:hover{border-color:var(--accent);background:#fdfcff;transform:translateY(-1px)}.toc strong{color:var(--accent)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;margin:18px 0;box-shadow:0 2px 10px rgba(15,23,42,.04);scroll-margin-top:92px}.card h2{margin:0 0 4px;line-height:1.32}
    .meta{color:var(--muted);font-size:.95rem;display:flex;gap:8px;flex-wrap:wrap}.pill{display:inline-block;background:var(--accent2);color:#403575;border-radius:999px;padding:2px 10px;font-size:.9rem}
    .section-title{margin:18px 0 6px;font-weight:800;color:var(--accent)}.box{white-space:pre-line;background:#fafafa;border-left:4px solid var(--accent);padding:12px 14px;border-radius:10px}
    .infogrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px;margin-top:10px}.info{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:10px 12px}.info b{color:var(--accent)}
    .videoBox{background:var(--warn);border:1px solid var(--warnLine);border-radius:14px;padding:12px;margin-top:12px}.videoBox a{color:#0f5ea8;font-weight:700}iframe{width:100%;aspect-ratio:16/9;border:0;border-radius:12px;background:#111827;margin-top:10px}.empty{color:var(--muted);font-style:italic;padding:4px 0 0}
    footer{color:var(--muted);border-top:1px solid var(--line);padding:22px 18px;background:#fff}
    @media print{.toolbar,iframe,.btn,.videoBox{display:none!important}body{background:white}.card{break-inside:avoid;box-shadow:none}}
  </style>
</head>
<body>
  <header><div class="wrap"><h1>物理因子治療學｜跑台考試</h1><p class="subtitle">四大儀器分類：頸椎牽引器、腰椎牽引器、IFC、肌肉電刺激。</p></div></header>
  <div class="toolbar"><div class="wrap"><input id="search" type="search" placeholder="搜尋：頸椎牽引、腰椎牽引、IFC、肌肉電刺激"><button onclick="window.print()">列印 / 另存 PDF</button><a class="btn secondary" href="../menu.html">科目目錄</a><a class="btn secondary" href="../">操作治療</a><a class="btn secondary" href="../mmt/">MMT</a><a class="btn secondary" href="../rom/">ROM</a></div></div>
  <main class="wrap" id="top">
    <section class="note"><strong>課程播放清單：</strong> <a href="https://youtube.com/playlist?list=PL_kdRB8mNB8BCgnLPuaWp72D3clTTXBOy&si=6R1GiJ6eurnwvTmU" target="_blank" rel="noopener">開啟物理因子 YouTube 播放清單</a><br><span class="small">依你提供的播放清單截圖，先整理成四大儀器。之後補單支影片連結與時間碼即可。</span></section>
    <section><h2>快速目錄</h2><div class="grid" id="toc"></div></section><section id="cards"></section>
  </main>
  <footer><div class="wrap"><p>使用提醒：此頁為物理因子治療學跑台複習用。內容會依你之後上傳的講義與考題繼續修正。</p></div></footer>
  <script src="data.js" charset="utf-8"></script><script src="videos.js" charset="utf-8"></script>
  <script>
    const PLAYLIST_URL = "https://youtube.com/playlist?list=PL_kdRB8mNB8BCgnLPuaWp72D3clTTXBOy&si=6R1GiJ6eurnwvTmU";
    function escapeHtml(str){return String(str||'').replace(/[&<>"']/g,function(s){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]})}
    function youtubeId(url){if(!url)return"";const ps=[/youtu\.be\/([A-Za-z0-9_-]{6,})/,/youtube\.com\/watch\?.*v=([A-Za-z0-9_-]{6,})/,/youtube\.com\/embed\/([A-Za-z0-9_-]{6,})/];for(const p of ps){const m=url.match(p);if(m)return m[1]}return""}
    function timeToSeconds(t){if(!t)return"";const parts=String(t).trim().split(":").map(Number);if(parts.some(Number.isNaN))return"";if(parts.length===1)return parts[0];if(parts.length===2)return parts[0]*60+parts[1];if(parts.length===3)return parts[0]*3600+parts[1]*60+parts[2];return""}
    function youtubeEmbed(url,start,end){const id=youtubeId(url);if(!id)return"";const params=[];const s=timeToSeconds(start);const e=timeToSeconds(end);if(s!=="")params.push("start="+s);if(e!=="")params.push("end="+e);params.push("rel=0");return "https://www.youtube.com/embed/"+id+(params.length?"?"+params.join("&"):"")}
    function scrollToQuestion(no){const el=document.getElementById("q"+no);if(el)el.scrollIntoView({behavior:"smooth",block:"start"})}
    function render(items){
      const toc=document.getElementById("toc");const cards=document.getElementById("cards");const videoMap=window.PA_VIDEO_LINKS||{};
      toc.innerHTML=items.map(function(item){return '<button type="button" class="toc" onclick="scrollToQuestion('+item.no+')"><strong>'+item.no+'.</strong> '+escapeHtml(item.title)+'<br><span class="small">'+escapeHtml(item.english||"")+'</span></button>'}).join("");
      cards.innerHTML=items.map(function(item){
        const v=videoMap[String(item.no)]||{};const embed=youtubeEmbed(v.url,v.start,v.end);
        const related=(item.related_videos||[]).map(function(r){return `<li><strong>${escapeHtml(r.title)}</strong>｜${escapeHtml(r.duration||"")}｜${escapeHtml(r.status||"")}</li>`}).join("");
        const relatedHtml=related?`<div class="videoBox"><strong>播放清單中相關影片：</strong><ul>${related}</ul><div><a href="${PLAYLIST_URL}" target="_blank" rel="noopener">開啟播放清單</a></div></div>`:"";
        const videoHtml=v.url?`<div class="videoBox"><div><strong>單支影片：</strong><a href="${escapeHtml(v.url)}" target="_blank" rel="noopener">開啟影片</a></div><div><strong>片段時間：</strong>${escapeHtml(v.start||"待補")}${v.end?" - "+escapeHtml(v.end):""}</div>${v.note?`<div><strong>影片重點：</strong>${escapeHtml(v.note)}</div>`:""}${embed?`<iframe src="${embed}" allowfullscreen title="${escapeHtml(item.title)}"></iframe>`:""}</div>${relatedHtml}`:relatedHtml;
        const searchText=(item.no+" "+item.title+" "+item.english+" "+item.category+" "+item.indications+" "+item.contraindications+" "+item.parameters+" "+item.procedure+" "+item.script).toLowerCase();
        return `<article class="card" id="q${item.no}" data-search="${escapeHtml(searchText)}"><h2>${item.no}. ${escapeHtml(item.title)}</h2><div class="meta"><span class="pill">${escapeHtml(item.category||"待分類")}</span><span class="pill">來源：${escapeHtml(item.source||"待補")}</span></div>${videoHtml}<div class="section-title">治療大綱</div><div class="infogrid"><div class="info"><b>適應症</b><br>${escapeHtml(item.indications)}</div><div class="info"><b>禁忌症</b><br>${escapeHtml(item.contraindications)}</div><div class="info"><b>參數 / 劑量</b><br>${escapeHtml(item.parameters)}</div><div class="info"><b>安全注意</b><br>${escapeHtml(item.safety)}</div></div><div class="section-title">操作流程</div><div class="box">${escapeHtml(item.procedure)}</div><div class="section-title">考試口條</div><div class="box">${escapeHtml(item.script)}</div></article>`;
      }).join("");
    }
    render(window.PA_ITEMS||[]);
    document.getElementById("search").addEventListener("input",function(e){const keyword=e.target.value.trim().toLowerCase();document.querySelectorAll(".card").forEach(function(card){card.style.display=card.dataset.search.includes(keyword)?"":"none"})})
  </script>
</body>
</html>
