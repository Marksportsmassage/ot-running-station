    function escapeHtml(str) {
      return String(str || '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]));
    }

    function youtubeEmbed(url) {
      if (!url) return "";
      const match = url.match(/(?:youtu\.be\/|v=)([A-Za-z0-9_-]{6,})/);
      return match ? "https://www.youtube.com/embed/" + match[1] : "";
    }

    function render(items) {
      const toc = document.getElementById('toc');
      const cards = document.getElementById('cards');

      toc.innerHTML = items.map(item => `
        <div class="toc">
          <a href="#q${item.no}"><strong>${item.no}.</strong> ${escapeHtml(item.title)}</a>
        </div>
      `).join('');

      cards.innerHTML = items.map(item => {
        const embed = youtubeEmbed(item.video);
        const videoHtml = item.video ? `
          <div class="videoBox">
            <div><strong>影片連結：</strong><a href="${escapeHtml(item.video)}" target="_blank" rel="noopener">開啟影片</a></div>
            <div><strong>時間碼：</strong>${escapeHtml(item.time || "待補")}</div>
            ${embed ? `<iframe src="${embed}" allowfullscreen title="${escapeHtml(item.title)}"></iframe>` : ""}
          </div>
        ` : `
          <div class="videoBox">
            <strong>影片連結：</strong>待補
            <div class="empty">之後把單支 YouTube 連結與時間碼補在這裡。</div>
          </div>
        `;

        return `
          <article class="card" id="q${item.no}" data-search="${escapeHtml((item.no + ' ' + item.title + ' ' + item.lay_title + ' ' + item.script + ' ' + item.operator).toLowerCase())}">
            <h2>${item.no}. ${escapeHtml(item.title)}</h2>
            <div class="meta">
              <span class="pill">患者說法：${escapeHtml(item.lay_title)}</span>
              <span class="pill">講義：${escapeHtml(item.source)}</span>
            </div>

            ${videoHtml}

            <div class="section-title">考試講稿</div>
            <div class="script">${escapeHtml(item.script)}</div>

            <details>
              <summary>操作者術語提示</summary>
              <p>${escapeHtml(item.operator)}</p>
            </details>
          </article>
        `;
      }).join('');
    }

    render(ITEMS);

    document.getElementById('search').addEventListener('input', (e) => {
      const keyword = e.target.value.trim().toLowerCase();
      document.querySelectorAll('.card').forEach(card => {
        card.style.display = card.dataset.search.includes(keyword) ? '' : 'none';
      });
    });
  </script>
