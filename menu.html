<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>跑台考試科目目錄</title>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:#f7f7f4;color:#1f2937}
    .wrap{max-width:980px;margin:0 auto;padding:42px 18px}
    h1{font-size:clamp(1.8rem,4vw,2.8rem);margin:0 0 12px}
    p{color:#64748b;line-height:1.7}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:24px}
    a.card{display:block;background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:22px;text-decoration:none;color:#1f2937;box-shadow:0 2px 10px rgba(15,23,42,.05)}
    a.card:hover{border-color:#7a4a2f;transform:translateY(-1px)}
    .tag{display:inline-block;background:#f7eadf;color:#5a321e;border-radius:999px;padding:2px 10px;font-size:.9rem;margin-bottom:8px}
  </style>
</head>
<body>
  <main class="wrap">
    <h1>跑台考試科目目錄</h1>
    <p>不同科目的跑台考試講稿、操作重點、講義圖片與影片對照。</p>
    <div class="grid">
      <a class="card" href="./">
        <span class="tag">操作治療</span>
        <h2>操作治療跑台考試</h2>
        <p>20題操作治療講稿與影片對照。</p>
      </a>
      <a class="card" href="./mmt/">
        <span class="tag">MMT</span>
        <h2>MMT 期末跑台</h2>
        <p>肌力測試姿勢、作動肌肉、評分重點與講義圖片。</p>
      </a>
      <a class="card" href="./rom/">
        <span class="tag">ROM</span>
        <h2>ROM 期末跑台</h2>
        <p>量角器擺位、固定、終點感覺與講義圖片。</p>
      </a>
    </div>
  </main>
</body>
</html>
