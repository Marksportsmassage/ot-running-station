<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ROM 期末跑台｜測量指引與影片對照</title>
<style>
:root{--bg:#f7f7f4;--card:#fff;--text:#1f2937;--muted:#64748b;--line:#e5e7eb;--accent:#7a4a2f;--accent2:#f7eadf;--warn:#fff7ed;--warnLine:#fed7aa}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei","PingFang TC","Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.72}
header{padding:32px 18px 20px;background:linear-gradient(135deg,#f7eadf,#fff);border-bottom:1px solid var(--line)}.wrap{max-width:1120px;margin:0 auto}h1{margin:0 0 8px;font-size:clamp(1.7rem,3.2vw,2.6rem);line-height:1.2}.subtitle,.small{color:var(--muted)}
.toolbar{position:sticky;top:0;z-index:10;background:rgba(247,247,244,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:12px 18px}.toolbar .wrap{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
input[type=search]{flex:1 1 260px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;font-size:16px;background:white}button,.btn{border:0;border-radius:12px;padding:10px 14px;background:var(--accent);color:white;cursor:pointer;text-decoration:none;font-weight:700}.btn.secondary{background:#475569}
main{padding:22px 18px 56px}.note{background:#fff7ed;border:1px solid #fed7aa;border-radius:18px;padding:18px;margin:12px 0 22px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin:18px 0 30px}
.toc{display:block;width:100%;min-height:76px;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;box-shadow:0 1px 2px rgba(0,0,0,.03);color:var(--text);cursor:pointer;font:inherit}.toc:hover{border-color:var(--accent);background:#fffcfa;transform:translateY(-1px)}.toc strong{color:var(--accent)}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;margin:18px 0;box-shadow:0 2px 10px rgba(15,23,42,.04);scroll-margin-top:92px}.card h2{margin:0 0 4px;line-height:1.32}.meta{color:var(--muted);font-size:.95rem;display:flex;gap:8px;flex-wrap:wrap}.pill{display:inline-block;background:var(--accent2);color:#5a321e;border-radius:999px;padding:2px 10px;font-size:.9rem}
.section-title{margin:18px 0 6px;font-weight:800;color:var(--accent)}.box{white-space:pre-line;background:#fafafa;border-left:4px solid var(--accent);padding:12px 14px;border-radius:10px}.measuregrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px;margin-top:10px}.measure{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:10px 12px}.measure b{color:var(--accent)}
.videoBox{background:var(--warn);border:1px solid var(--warnLine);border-radius:14px;padding:12px;margin-top:12px}.videoBox a{color:#0f5ea8;font-weight:700}iframe{width:100%;aspect-ratio:16/9;border:0;border-radius:12px;background:#111827;margin-top:10px}.empty{color:var(--muted);font-style:italic;padding:4px 0 0}
.pageimg{width:min(100%,460px);display:block;margin:10px auto 0;border:1px solid var(--line);border-radius:14px;background:white;box-shadow:0 2px 8px rgba(15,23,42,.06)}.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}.gallery a{display:block;background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px;text-decoration:none;color:var(--text)}.gallery img{width:100%;border-radius:10px;border:1px solid var(--line)}footer{color:var(--muted);border-top:1px solid var(--line);padding:22px 18px;background:#fff}@media print{.toolbar,iframe,.btn,.videoBox,.gallerySection{display:none!important}body{background:white}.card{break-inside:avoid;box-shadow:none}.pageimg{max-height:600px;object-fit:contain}}
</style></head>
<body><header><div class="wrap"><h1>ROM 期末跑台｜測量指引與影片對照</h1><p class="subtitle">依據 ROM 測量指引與期末考跑台試題整理：姿勢、固定、終點感覺、量角器支點、固定臂、移動臂與圖片。ROM標題欄修正版 v4｜版面縮小顯示版 v10。</p></div></header>
<div class="toolbar"><div class="wrap"><input id="search" type="search" placeholder="搜尋題號、關節、關鍵字，例如：hip、ankle、subtalar、橫跗"><button onclick="window.print()">列印 / 另存 PDF</button><a class="btn secondary" href="../menu.html">科目目錄</a><a class="btn secondary" href="../">操作治療</a><a class="btn secondary" href="../mmt/">MMT</a></div></div>
<main class="wrap" id="top"><section class="note"><strong>跑台評分提醒：</strong>擺位、固定、做測試動作、說終點感覺、找並標出量角器支點/固定臂/移動臂、正確放置量角器、眼睛與量角器同高、確認完整 ROM 且無代償、讀出刻度。</section>
<section><h2>快速目錄</h2><div class="grid" id="toc"></div></section><section id="cards"></section><section class="gallerySection"><h2>對應題目圖片總覽</h2><p class="small">以下為 PDF 全頁圖片，已保留原本表格與示意圖。點圖可開啟大圖。</p><div class="gallery" id="gallery"></div></section></main>
<footer><div class="wrap"><p>使用提醒：此頁為跑台複習用整理版。實際測量仍以老師示範與課堂講義為準。</p></div></footer>
<script src="data.js" charset="utf-8"></script><script src="videos.js" charset="utf-8"></script><script src="gallery.js" charset="utf-8"></script>
<script>
function escapeHtml(str){return String(str||'').replace(/[&<>"']/g,function(s){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]})}
function youtubeId(url){if(!url)return"";const ps=[/youtu\.be\/([A-Za-z0-9_-]{6,})/,/youtube\.com\/watch\?.*v=([A-Za-z0-9_-]{6,})/,/youtube\.com\/embed\/([A-Za-z0-9_-]{6,})/];for(const p of ps){const m=url.match(p);if(m)return m[1]}return""}
function timeToSeconds(t){if(!t)return"";const parts=String(t).trim().split(":").map(Number);if(parts.some(Number.isNaN))return"";if(parts.length===1)return parts[0];if(parts.length===2)return parts[0]*60+parts[1];if(parts.length===3)return parts[0]*3600+parts[1]*60+parts[2];return""}
function youtubeEmbed(url,start,end){const id=youtubeId(url);if(!id)return"";const params=[];const s=timeToSeconds(start);const e=timeToSeconds(end);if(s!=="")params.push("start="+s);if(e!=="")params.push("end="+e);params.push("rel=0");return "https://www.youtube.com/embed/"+id+(params.length?"?"+params.join("&"):"")}
function scrollToQuestion(no){const el=document.getElementById("q"+no);if(el)el.scrollIntoView({behavior:"smooth",block:"start"})}
function render(items){const toc=document.getElementById("toc");const cards=document.getElementById("cards");const videoMap=window.ROM_VIDEO_LINKS||{};toc.innerHTML=items.map(function(item){return '<button type="button" class="toc" onclick="scrollToQuestion('+item.no+')"><strong>'+item.no+'.</strong> '+escapeHtml(item.title)+'<br><span class="small">'+escapeHtml(item.english)+'</span></button>'}).join("");
cards.innerHTML=items.map(function(item){const v=videoMap[String(item.no)]||{};const embed=youtubeEmbed(v.url,v.start,v.end);const videoHtml=v.url?`<div class="videoBox"><div><strong>影片連結：</strong><a href="${escapeHtml(v.url)}" target="_blank" rel="noopener">開啟影片</a></div><div><strong>片段時間：</strong>${escapeHtml(v.start||"待補")}${v.end?" - "+escapeHtml(v.end):""}</div>${v.note?`<div><strong>影片重點：</strong>${escapeHtml(v.note)}</div>`:""}${embed?`<iframe src="${embed}" allowfullscreen title="${escapeHtml(item.title)}"></iframe>`:""}</div>`:`<div class="videoBox"><strong>影片連結：</strong>待補<div class="empty">請在 rom/videos.js 填入第 ${item.no} 題影片連結與時間碼。</div></div>`;const searchText=(item.no+" "+item.title+" "+item.english+" "+item.position+" "+item.fixation+" "+item.endfeel+" "+item.fulcrum+" "+item.stationary+" "+item.moving+" "+item.script).toLowerCase();return `<article class="card" id="q${item.no}" data-search="${escapeHtml(searchText)}"><h2>${item.no}. ${escapeHtml(item.title)}</h2><div class="meta"><span class="pill">${escapeHtml(item.english)}</span><span class="pill">來源：${escapeHtml(item.source)}</span></div>${videoHtml}<div class="section-title">測量大綱</div><div class="measuregrid"><div class="measure"><b>姿勢</b><br>${escapeHtml(item.position)}</div><div class="measure"><b>固定</b><br>${escapeHtml(item.fixation)}</div><div class="measure"><b>終點感覺</b><br>${escapeHtml(item.endfeel)}</div><div class="measure"><b>量角器支點</b><br>${escapeHtml(item.fulcrum)}</div><div class="measure"><b>固定臂</b><br>${escapeHtml(item.stationary)}</div><div class="measure"><b>移動臂</b><br>${escapeHtml(item.moving)}</div></div><div class="section-title">考試口條</div><div class="box">${escapeHtml(item.script)}</div>${item.note?`<div class="section-title">備註</div><div class="box">${escapeHtml(item.note)}</div>`:""}<div class="section-title">對應題目圖片</div><a href="${escapeHtml(item.page_image)}" target="_blank" style="display:block;text-align:center;"><img class="pageimg" src="${escapeHtml(item.page_image)}" alt="${escapeHtml(item.title)}"></a><div class="small" style="text-align:center;margin-top:6px;">頁面先顯示縮小版，點圖片可放大查看。</div></article>`}).join("")}
function renderGallery(){const g=document.getElementById("gallery");g.innerHTML=(window.ROM_GALLERY||[]).map(function(x){return `<a href="${escapeHtml(x.src)}" target="_blank"><img src="${escapeHtml(x.src)}" alt="${escapeHtml(x.label)}"><div>${escapeHtml(x.label)}</div></a>`}).join("")}
render(window.ROM_ITEMS||[]);renderGallery();document.getElementById("search").addEventListener("input",function(e){const keyword=e.target.value.trim().toLowerCase();document.querySelectorAll(".card").forEach(function(card){card.style.display=card.dataset.search.includes(keyword)?"":"none"})})
</script></body></html>
